
name: Build Log Merge Tool

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    env:
      APP_NAME: LogMergeTool_NoExcel
      MAIN_PY: LogMergeTool_NoExcel_Main.py
      VENV_DIR: .venv_build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify Python
        shell: cmd
        run: |
          py -3.13 --version

      - name: Verify Main Script
        shell: cmd
        run: |
          if not exist "%MAIN_PY%" (
            echo [ERROR] %MAIN_PY% was not found.
            exit /b 1
          )

      - name: Create Clean Build Venv
        shell: cmd
        run: |
          if not exist "%VENV_DIR%\Scripts\python.exe" (
            py -3.13 -m venv "%VENV_DIR%"
          )

      - name: Install Build Dependencies
        shell: cmd
        run: |
          "%CD%\%VENV_DIR%\Scripts\python.exe" -m pip install --upgrade pip setuptools wheel
          "%CD%\%VENV_DIR%\Scripts\python.exe" -m pip install --upgrade nuitka PySide6 openpyxl ordered-set zstandard

      - name: Verify Source Compile
        shell: cmd
        run: |
          "%CD%\%VENV_DIR%\Scripts\python.exe" -m py_compile "%MAIN_PY%"

      - name: Clean Old Output
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist
          if exist %APP_NAME%.build rmdir /s /q %APP_NAME%.build
          if exist %APP_NAME%.dist rmdir /s /q %APP_NAME%.dist
          if exist %APP_NAME%.onefile-build rmdir /s /q %APP_NAME%.onefile-build
          if exist nuitka-crash-report.xml del /q nuitka-crash-report.xml

      - name: Build EXE With Nuitka
        shell: cmd
        run: |
          "%CD%\%VENV_DIR%\Scripts\python.exe" -m nuitka ^
            --standalone ^
            --onefile ^
            --assume-yes-for-downloads ^
            --enable-plugin=pyside6 ^
            --windows-console-mode=disable ^
            --nofollow-import-to=numpy ^
            --nofollow-import-to=pandas ^
            --nofollow-import-to=scipy ^
            --nofollow-import-to=matplotlib ^
            --nofollow-import-to=PIL ^
            --company-name="LogMerge" ^
            --product-name="Log Merge Tool No Excel" ^
            --file-description="Log Merge Tool No Excel" ^
            --file-version=2.3.0.0 ^
            --product-version=2.3.0.0 ^
            --output-filename=%APP_NAME%.exe ^
            --output-dir=dist ^
            --include-data-file=csa_error_rules.json=csa_error_rules.json ^
            --include-data-file=site_serial_map.json=site_serial_map.json ^
            "%MAIN_PY%"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogMergeTool_NoExcel
          path: dist/LogMergeTool_NoExcel.exe
