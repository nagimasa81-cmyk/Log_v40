name: Build_EXE_Windows11_Python313_Nuitka_NO_EXCEL_FINAL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Command
        shell: cmd
        run: |
          setlocal EnableExtensions EnableDelayedExpansion
      - name: Command
        shell: cmd
        run: |
          cd /d "%~dp0"
      - name: Command
        shell: cmd
        run: |
          REM ============================================================
      - name: Command
        shell: cmd
        run: |
          REM Log Merge Tool - NO EXCEL / NO COM v9 Content Timestamp BuildFix
      - name: Command
        shell: cmd
        run: |
          REM Target OS : Windows 11
      - name: Command
        shell: cmd
        run: |
          REM Python    : 3.13
      - name: Command
        shell: cmd
        run: |
          REM GUI       : PySide6 latest
      - name: Command
        shell: cmd
        run: |
          REM Builder   : Nuitka latest
      - name: Command
        shell: cmd
        run: |
          REM Output    : dist\LogMergeTool_NoExcel.exe
      - name: Command
        shell: cmd
        run: |
          REM
      - name: Command
        shell: cmd
        run: |
          REM BuildFix:
      - name: Command
        shell: cmd
        run: |
          REM - Uses a clean local .venv_build so unrelated packages such as numpy
      - name: Command
        shell: cmd
        run: |
          REM   installed in the global Python environment are not pulled into Nuitka.
      - name: Command
        shell: cmd
        run: |
          REM - Adds --nofollow-import-to for heavy optional packages.
      - name: Command
        shell: cmd
        run: |
          REM ============================================================
      - name: Command
        shell: cmd
        run: |
          set APP_NAME=LogMergeTool_NoExcel
      - name: Command
        shell: cmd
        run: |
          set MAIN_PY=LogMergeTool_NoExcel_Main.py
      - name: Command
        shell: cmd
        run: |
          set PYLAUNCHER=py -3.13
      - name: Command
        shell: cmd
        run: |
          set VENV_DIR=.venv_build
      - name: Command
        shell: cmd
        run: |
          set PY=%CD%\%VENV_DIR%\Scripts\python.exe
      - name: Command
        shell: cmd
        run: |
          echo ============================================================
      - name: Command
        shell: cmd
        run: |
          echo  Log Merge Tool - v9 CONTENT TIMESTAMP BUILDFIX
      - name: Command
        shell: cmd
        run: |
          echo ============================================================
      - name: Command
        shell: cmd
        run: |
          echo.
      - name: Command
        shell: cmd
        run: |
          %PYLAUNCHER% --version >nul 2>&1
      - name: Command
        shell: cmd
        run: |
          if errorlevel 1 (
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] Python 3.13 was not found.
      - name: Command
        shell: cmd
        run: |
          echo Install Python 3.13 from python.org and enable the py launcher.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
      - name: Command
        shell: cmd
        run: |
          )
      - name: Command
        shell: cmd
        run: |
          if not exist "%MAIN_PY%" (
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] %MAIN_PY% was not found in this folder.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
      - name: Command
        shell: cmd
        run: |
          )
      - name: Command
        shell: cmd
        run: |
          echo [1/6] Creating clean local build venv...
      - name: Command
        shell: cmd
        run: |
          if not exist "%VENV_DIR%\Scripts\python.exe" (
      - name: Command
        shell: cmd
        run: |
          %PYLAUNCHER% -m venv "%VENV_DIR%"
      - name: Command
        shell: cmd
        run: |
          if errorlevel 1 goto :ERR_VENV
      - name: Command
        shell: cmd
        run: |
          )
      - name: Command
        shell: cmd
        run: |
          echo [2/6] Installing/upgrading required packages in clean venv...
      - name: Command
        shell: cmd
        run: |
          "%PY%" -m pip install --upgrade pip setuptools wheel
      - name: Command
        shell: cmd
        run: |
          "%PY%" -m pip install --upgrade nuitka PySide6 openpyxl ordered-set zstandard
      - name: Command
        shell: cmd
        run: |
          if errorlevel 1 goto :ERR_PIP
      - name: Command
        shell: cmd
        run: |
          echo [3/6] Verifying source compile...
      - name: Command
        shell: cmd
        run: |
          "%PY%" -m py_compile "%MAIN_PY%"
      - name: Command
        shell: cmd
        run: |
          if errorlevel 1 goto :ERR_COMPILE
      - name: Command
        shell: cmd
        run: |
          echo [4/6] Cleaning old output...
      - name: Command
        shell: cmd
        run: |
          if exist build rmdir /s /q build
      - name: Command
        shell: cmd
        run: |
          if exist dist rmdir /s /q dist
      - name: Command
        shell: cmd
        run: |
          if exist %APP_NAME%.build rmdir /s /q %APP_NAME%.build
      - name: Command
        shell: cmd
        run: |
          if exist %APP_NAME%.dist rmdir /s /q %APP_NAME%.dist
      - name: Command
        shell: cmd
        run: |
          if exist %APP_NAME%.onefile-build rmdir /s /q %APP_NAME%.onefile-build
      - name: Command
        shell: cmd
        run: |
          if exist nuitka-crash-report.xml del /q nuitka-crash-report.xml
      - name: Command
        shell: cmd
        run: |
          echo [5/6] Building ONEFILE EXE with Nuitka...
      - name: Command
        shell: cmd
        run: |
          "%PY%" -m nuitka ^
      - name: Command
        shell: cmd
        run: |
          --standalone ^
      - name: Command
        shell: cmd
        run: |
          --onefile ^
      - name: Command
        shell: cmd
        run: |
          --assume-yes-for-downloads ^
      - name: Command
        shell: cmd
        run: |
          --enable-plugin=pyside6 ^
      - name: Command
        shell: cmd
        run: |
          --windows-console-mode=disable ^
      - name: Command
        shell: cmd
        run: |
          --nofollow-import-to=numpy ^
      - name: Command
        shell: cmd
        run: |
          --nofollow-import-to=pandas ^
      - name: Command
        shell: cmd
        run: |
          --nofollow-import-to=scipy ^
      - name: Command
        shell: cmd
        run: |
          --nofollow-import-to=matplotlib ^
      - name: Command
        shell: cmd
        run: |
          --nofollow-import-to=PIL ^
      - name: Command
        shell: cmd
        run: |
          --company-name="LogMerge" ^
      - name: Command
        shell: cmd
        run: |
          --product-name="Log Merge Tool No Excel" ^
      - name: Command
        shell: cmd
        run: |
          --file-description="Log Merge Tool No Excel" ^
      - name: Command
        shell: cmd
        run: |
          --file-version=2.3.0.0 ^
      - name: Command
        shell: cmd
        run: |
          --product-version=2.3.0.0 ^
      - name: Command
        shell: cmd
        run: |
          --output-filename=%APP_NAME%.exe ^
      - name: Command
        shell: cmd
        run: |
          --output-dir=dist ^
      - name: Command
        shell: cmd
        run: |
          --include-data-file=csa_error_rules.json=csa_error_rules.json ^
      - name: Command
        shell: cmd
        run: |
          --include-data-file=site_serial_map.json=site_serial_map.json ^
      - name: Command
        shell: cmd
        run: |
          "%MAIN_PY%"
      - name: Command
        shell: cmd
        run: |
          if errorlevel 1 goto :ERR_NUITKA
      - name: Command
        shell: cmd
        run: |
          echo [6/6] Build completed.
      - name: Command
        shell: cmd
        run: |
          echo.
      - name: Command
        shell: cmd
        run: |
          echo Main EXE:
      - name: Command
        shell: cmd
        run: |
          echo   %CD%\dist\%APP_NAME%.exe
      - name: Command
        shell: cmd
        run: |
          echo.
      - name: Command
        shell: cmd
        run: |
          exit /b 0
      - name: Command
        shell: cmd
        run: |
          :ERR_VENV
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] Could not create local build venv.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
      - name: Command
        shell: cmd
        run: |
          :ERR_PIP
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] Package installation failed.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
      - name: Command
        shell: cmd
        run: |
          :ERR_COMPILE
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] Python source compile check failed.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
      - name: Command
        shell: cmd
        run: |
          :ERR_NUITKA
      - name: Command
        shell: cmd
        run: |
          echo [ERROR] Nuitka build failed.
      - name: Command
        shell: cmd
        run: |
          echo.
      - name: Command
        shell: cmd
        run: |
          echo If the error mentions module.numpy or Scons, delete .venv_build and run this BAT again.
      - name: Command
        shell: cmd
        run: |
          echo If it still fails, run Build_DEBUG_Console_EXE.bat and send the console text.
      - name: Command
        shell: cmd
        run: |
          exit /b 1
